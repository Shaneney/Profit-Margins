<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProfitLens // Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0a0a0c; color: #fff; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(90deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input { background: rgba(255, 255, 255, 0.05) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; }
        .img-preview { width: 45px; height: 45px; border-radius: 12px; object-fit: cover; background: #222; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-bold gradient-text tracking-tight">ProfitLens</h1>
                <p class="text-gray-400 text-sm">Visual Inventory Tracker</p>
            </div>
            <div class="glass p-4 rounded-2xl text-right">
                <span class="block text-xs uppercase tracking-widest text-gray-500 font-semibold">Net Profit</span>
                <span id="total-profit" class="text-2xl font-bold text-green-400">$0.00</span>
            </div>
        </header>

        <section class="glass p-6 rounded-3xl mb-8">
            <h2 class="text-lg font-semibold mb-4 text-indigo-300">New Transaction</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <input type="text" id="item-name" placeholder="Item Name" class="p-3 rounded-xl outline-none focus:ring-2 ring-indigo-500">
                <div class="flex gap-2">
                    <input type="number" id="buy-price" placeholder="Buy $" class="p-3 rounded-xl w-1/2 outline-none">
                    <input type="number" id="sell-price" placeholder="Sell $" class="p-3 rounded-xl w-1/2 outline-none">
                </div>
            </div>
            <div class="flex flex-col md:flex-row gap-4 items-center">
                <label class="w-full md:w-auto flex-grow cursor-pointer bg-white/5 hover:bg-white/10 border border-dashed border-white/20 p-3 rounded-xl text-center text-gray-400 transition">
                    <span id="file-label">📸 Tap to add photo</span>
                    <input type="file" id="item-image" accept="image/*" class="hidden" onchange="updateFileLabel()">
                </label>
                <button onclick="addItem()" class="w-full md:w-48 bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl transition shadow-lg shadow-indigo-500/20">Add Entry</button>
            </div>
        </section>

        <section class="glass rounded-3xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-white/5 border-b border-white/10 text-gray-400 text-xs uppercase tracking-wider">
                        <tr>
                            <th class="p-4">Item</th>
                            <th class="p-4">Buy</th>
                            <th class="p-4">Sell</th>
                            <th class="p-4">Profit</th>
                            <th class="p-4 text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-list"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        let items = JSON.parse(localStorage.getItem('profitItems')) || [];

        function updateFileLabel() {
            const input = document.getElementById('item-image');
            document.getElementById('file-label').innerText = input.files[0] ? "✅ Photo ready" : "📸 Tap to add photo";
        }

        async function addItem() {
            const name = document.getElementById('item-name').value;
            const buy = parseFloat(document.getElementById('buy-price').value);
            const sell = parseFloat(document.getElementById('sell-price').value);
            const fileInput = document.getElementById('item-image');
            
            let imageData = "";

            if (fileInput.files && fileInput.files[0]) {
                imageData = await convertBase64(fileInput.files[0]);
            }

            if (name && !isNaN(buy) && !isNaN(sell)) {
                items.push({ name, buy, sell, image: imageData });
                // Reset inputs
                document.getElementById('item-name').value = '';
                document.getElementById('buy-price').value = '';
                document.getElementById('sell-price').value = '';
                document.getElementById('item-image').value = '';
                document.getElementById('file-label').innerText = "📸 Tap to add photo";
                render();
            }
        }

        function convertBase64(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.readAsDataURL(file);
            });
        }

        function render() {
            const list = document.getElementById('inventory-list');
            const totalDisplay = document.getElementById('total-profit');
            list.innerHTML = '';
            let total = 0;

            items.forEach((item, index) => {
                const profit = item.sell - item.buy;
                total += profit;
                const imgTag = item.image ? `<img src="${item.image}" class="img-preview mr-3">` : `<div class="img-preview mr-3 flex items-center justify-center text-xs text-gray-600">No Pic</div>`;
                
                list.innerHTML += `
                    <tr class="border-b border-white/5 hover:bg-white/5 transition">
                        <td class="p-4 flex items-center">
                            ${imgTag}
                            <span class="font-medium">${item.name}</span>
                        </td>
                        <td class="p-4 text-gray-400 tracking-tight">$${item.buy}</td>
                        <td class="p-4 text-gray-400 tracking-tight">$${item.sell}</td>
                        <td class="p-4 font-bold ${profit >= 0 ? 'text-green-400' : 'text-red-400'} tracking-tight">$${profit.toFixed(2)}</td>
                        <td class="p-4 text-center">
                            <button onclick="removeItem(${index})" class="text-gray-600 hover:text-red-400 transition text-lg">✕</button>
                        </td>
                    </tr>
                `;
            });

            totalDisplay.innerText = `$${total.toFixed(2)}`;
            localStorage.setItem('profitItems', JSON.stringify(items));
        }

        function removeItem(index) {
            if(confirm("Delete this entry?")) {
                items.splice(index, 1);
                render();
            }
        }

        render();
    </script>
</body>
</html>
