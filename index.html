<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProfitLens £ // Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0a0a0c; color: #fff; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { 
            background: linear-gradient(135deg, #000000 0%, #7f1d1d 45%, #ef4444 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.5));
            letter-spacing: -0.05em;
        }
        input { background: rgba(255, 255, 255, 0.07) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; }
        .img-preview { width: 45px; height: 45px; border-radius: 10px; object-fit: cover; background: #222; }
    </style>
</head>
<body class="p-4 md:p-8 pb-20">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-4xl font-extrabold gradient-text tracking-tighter">ProfitLens</h1>
                <p class="text-gray-500 text-xs font-semibold uppercase tracking-widest ml-1">Inventory Analytics</p>
            </div>
            <div class="glass p-4 rounded-2xl text-right">
                <span class="block text-xs uppercase tracking-widest text-gray-500 font-semibold">Total Profit</span>
                <span id="total-profit" class="text-2xl font-bold text-red-500">£0.00</span>
            </div>
        </header>

        <section class="glass p-6 rounded-3xl mb-8">
            <h2 id="form-title" class="text-lg font-semibold mb-4 text-red-400/80">Add New Item</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <input type="text" id="item-name" placeholder="Item Name">
                <input type="text" id="item-url" placeholder="Listing URL">
            </div>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <input type="number" id="buy-price" placeholder="Buy £">
                <input type="number" id="sell-price" placeholder="Sell £">
            </div>
            <div class="flex flex-col md:flex-row gap-4 items-center">
                <label class="w-full md:w-auto flex-grow cursor-pointer bg-white/5 border border-dashed border-white/20 p-3 rounded-xl text-center text-gray-400">
                    <span id="file-label">📸 Add Photo</span>
                    <input type="file" id="item-image" accept="image/*" class="hidden" onchange="document.getElementById('file-label').innerText = '✅ Ready'">
                </label>
                <button id="main-btn" onclick="handleAction()" class="w-full md:w-48 bg-red-700 hover:bg-red-600 text-white font-bold py-3 rounded-xl shadow-lg shadow-red-900/20">Add Entry</button>
            </div>
        </section>

        <section class="glass rounded-3xl overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-white/5 border-b border-white/10 text-gray-400 text-xs uppercase">
                    <tr>
                        <th class="p-4">Item</th>
                        <th class="p-4">Buy</th>
                        <th class="p-4">Sell</th>
                        <th class="p-4">Profit</th>
                        <th class="p-4 text-center">Action</th>
                    </tr>
                </thead>
                <tbody id="inventory-list"></tbody>
            </table>
        </section>
    </div>

    <script>
        let items = JSON.parse(localStorage.getItem('profitItems')) || [];
        let editIdx = null;

        async function handleAction() {
            const name = document.getElementById('item-name').value;
            if (!name) return alert("Please enter an item name");

            const url = document.getElementById('item-url').value;
            const buy = parseFloat(document.getElementById('buy-price').value) || 0;
            const sell = parseFloat(document.getElementById('sell-price').value) || 0;
            const fileInput = document.getElementById('item-image');
            
            let img = editIdx !== null ? items[editIdx].image : "";
            if (fileInput.files[0]) {
                img = await new Promise(r => {
                    const rd = new FileReader();
                    rd.onload = () => r(rd.result);
                    rd.readAsDataURL(fileInput.files[0]);
                });
            }

            const data = { name, url, buy, sell, image: img };

            if (editIdx !== null) {
                items[editIdx] = data;
                editIdx = null;
            } else {
                items.push(data);
            }

            resetForm();
            render();
        }

        function render() {
            const list = document.getElementById('inventory-list');
            list.innerHTML = '';
            let total = 0;

            items.forEach((it, i) => {
                const p = it.sell - it.buy;
                total += p;
                const img = it.image ? `<img src="${it.image}" class="img-preview mr-3">` : `<div class="img-preview mr-3 bg-white/5"></div>`;
                const link = it.url ? `<a href="${it.url}" target="_blank" class="text-red-400 block text-xs underline">View ↗</a>` : '';

                list.innerHTML += `
                    <tr class="border-b border-white/5">
                        <td class="p-4 flex items-center">${img} <div><b>${it.name}</b>${link}</div></td>
                        <td class="p-4 text-gray-400">£${it.buy}</td>
                        <td class="p-4 text-gray-400">£${it.sell}</td>
                        <td class="p-4 font-bold ${p >= 0 ? 'text-red-500' : 'text-gray-500'}">£${p.toFixed(2)}</td>
                        <td class="p-4 text-center">
                            <button onclick="edit(${i})" class="mr-2">✏️</button>
                            <button onclick="remove(${i})">✕</button>
                        </td>
                    </tr>`;
            });
            document.getElementById('total-profit').innerText = `£${total.toFixed(2)}`;
            localStorage.setItem('profitItems', JSON.stringify(items));
        }

        function edit(i) {
            editIdx = i;
            document.getElementById('item-name').value = items[i].name;
            document.getElementById('item-url').value = items[i].url;
            document.getElementById('buy-price').value = items[i].buy;
            document.getElementById('sell-price').value = items[i].sell;
            document.getElementById('main-btn').innerText = "Save Changes";
            document.getElementById('form-title').innerText = "Editing Item...";
            window.scrollTo(0,0);
        }

        function remove(i) {
            if (confirm("Delete?")) { items.splice(i, 1); render(); }
        }

        function resetForm() {
            document.getElementById('item-name').value = '';
            document.getElementById('item-url').value = '';
            document.getElementById('buy-price').value = '';
            document.getElementById('sell-price').value = '';
            document.getElementById('item-image').value = '';
            document.getElementById('file-label').innerText = "📸 Add Photo";
            document.getElementById('main-btn').innerText = "Add Entry";
            document.getElementById('form-title').innerText = "Add New Item";
        }

        render();
    </script>
</body>
</html>
