<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProfitLens £ // Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0a0a0c; color: #fff; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* Restored Original Indigo Gradient */
        .gradient-text { 
            background: linear-gradient(90deg, #818cf8, #c084fc);
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
        }

        input { background: rgba(255, 255, 255, 0.07) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; }
        .img-preview { width: 45px; height: 45px; border-radius: 10px; object-fit: cover; background: #222; }
    </style>
</head>

            </div>
            <div class="glass p-4 rounded-2xl text-right">
                <span class="block text-xs uppercase tracking-widest text-gray-500 font-semibold">Total Profit</span>
                <span id="total-profit" class="text-2xl font-bold text-green-400">£0.00</span>
            </div>
        </header>

                <input type="text" id="item-name" placeholder="Item Name" class="p-3 rounded-xl outline-none focus:ring-2 ring-indigo-500 transition">
                <input type="text" id="item-url" placeholder="Listing URL (eBay, Vinted, etc.)" class="p-3 rounded-xl outline-none focus:ring-2 ring-indigo-500 transition">
            </div>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <input type="number" id="buy-price" placeholder="Buy £" class="p-3 rounded-xl outline-none focus:ring-2 ring-indigo-500 transition">
                <input type="number" id="sell-price" placeholder="Sell £" class="p-3 rounded-xl outline-none focus:ring-2 ring-indigo-500 transition">
            </div>
